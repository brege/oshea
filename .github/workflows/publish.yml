name: Publish to npm

on:
  release:
    types: [published]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    if: github.repository == 'brege/oshea'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run all tests
        run: npm test

  publish:
    if: github.repository == 'brege/oshea'
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Upgrade npm for trusted publishing
        run: |
          npm install --global npm@^11.5.1
          npm --version

      - name: Validate release tag matches package version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${VERSION}"
          if [ "${TAG}" != "${EXPECTED_TAG}" ]; then
            echo "Release tag (${TAG}) does not match package version (${EXPECTED_TAG})."
            exit 1
          fi

      - name: Publish package
        run: npm publish --access public --provenance
