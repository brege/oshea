name: plugin update (End-to-End Test) src/cli/plugin/update.command.js
test_id: 3.17.2
base_command: oshea
tags:
  - plugin
  - update
  - cli
  - smoke
  - sad-path
workflow: true
scenarios:
  - description: should create a local plugin for explicit update sad path
    test_id: 3.17.2.1
    args: plugin create my-plugin-update-sad --outdir {{tmpdir}}
    expect:
      contains_all:
        - created successfully
        - my-plugin-update-sad
  - description: should add the local plugin
    test_id: 3.17.2.2
    args: plugin add {{tmpdir}}/my-plugin-update-sad
    expect:
      contains: Successfully processed 'plugin add'
  - description: should fail explicit update for non-git plugin
    test_id: 3.17.2.3
    args: plugin update my-plugin-update-sad
    expect_failure:
      exit_code: 1
      contains: is not git-sourced
