name: plugin update (End-to-End Test) src/cli/plugin/update.command.js
test_id: 3.17.1
base_command: oshea
tags:
  - plugin
  - update
  - cli
  - smoke
workflow: true
scenarios:
  - description: should create a local plugin for update tests
    test_id: 3.17.1.1
    args: plugin create my-plugin-to-update --outdir {{tmpdir}}
    expect:
      contains_all:
        - created successfully
        - my-plugin-to-update
  - description: should add the local plugin
    test_id: 3.17.1.2
    args: plugin add {{tmpdir}}/my-plugin-to-update
    expect:
      contains: Successfully processed 'plugin add'
  - description: should skip local-source plugins on bulk update
    test_id: 3.17.1.3
    args: plugin update
    expect:
      contains_all:
        - "Skipping 'my-plugin-to-update': not git-sourced"
        - Plugin update complete
